<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Dash</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            display: block;
        }

        #hud {
            position: fixed;
            inset: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 7%;
            transition: opacity 0.6s ease;
        }

        #hud.hidden {
            opacity: 0;
        }

        .bar-wrap {
            position: relative;
            width: min(360px, 72vw);
            height: 28px;
        }

        .bar-border {
            position: absolute;
            inset: 0;
            z-index: 2;
            border-radius: 5px;
            border: 3px solid #c8860a;
            box-shadow:
                0 0 0 1px #7a4d00,
                inset 0 0 0 1px #f5c842,
                0 2px 10px rgba(0, 0, 0, 0.8);
            background: transparent;
        }

        .bar-track {
            position: absolute;
            inset: 3px;
            z-index: 0;
            background: #150900;
            border-radius: 3px;
            overflow: hidden;
        }

        .bar-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%;
            will-change: width;
            border-radius: 2px;
            z-index: 1;
            transition: width 0.1s linear;
            background: linear-gradient(to bottom,
                    #ffe97a 0%,
                    #f5c000 35%,
                    #c88000 65%,
                    #f5c000 100%);
        }

        .bar-fill::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.3) 0%, transparent 55%);
        }

        .bar-pct {
            margin-top: 6px;
            font-family: 'Arial Black', Arial, sans-serif;
            font-size: clamp(10px, 2vw, 13px);
            font-weight: 900;
            color: #fff;
            text-shadow: 1px 1px 0 #000, -1px -1px 0 #000,
                1px -1px 0 #000, -1px 1px 0 #000;
            letter-spacing: 0.05em;
        }
    </style>
</head>

<body>

    <div id="hud">
        <div class="bar-wrap">
            <div class="bar-border"></div>
            <div class="bar-track">
                <div class="bar-fill" id="barFill"></div>
            </div>
        </div>
        <div class="bar-pct" id="barPct">0%</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/8.5.2/pixi.min.js"></script>
    <script type="module">
        import { Director } from './src/Director.js';
        import { LoadingScreen } from './src/LoadingScreen.js';
        import { MainScene } from './src/MainScreen.js'; // ← FIXED: was MainScene.js

        // ── Asset manifest ──
        // These are all loaded via PIXI.Assets so .get() works everywhere
        const ASSETS_LOADING = [
            { alias: 'creator', src: './assets/creator.png' },
            { alias: 'name', src: './assets/name.png' },
            { alias: 'background', src: './assets/background.png' },
        ];

        const ASSETS_MAIN = [
            { alias: 'ground', src: './assets/ground.png' },
            { alias: 'groundline', src: './assets/groundline.png' },
            { alias: 'groundshadow', src: './assets/groundshadow.png' },
        ];

        // ── Progress bar helpers ──
        const barFill = document.getElementById('barFill');
        const barPct = document.getElementById('barPct');
        const hud = document.getElementById('hud');

        function setProgress(p) {
            p = Math.min(1, Math.max(0, p));
            barFill.style.width = (p * 100) + '%';
            barPct.textContent = Math.round(p * 100) + '%';
        }

        // ── Init PixiJS ──
        const app = new PIXI.Application();
        await app.init({
            resizeTo: window,
            backgroundColor: 0x000000,
            antialias: true,
        });
        document.body.appendChild(app.canvas);

        const director = new Director(app);

        // ── Phase 1: load assets needed for loading screen via PIXI.Assets ──
        // Using PIXI.Assets for ALL textures so PIXI.Assets.get() works in every class
        setProgress(0.05);

        await PIXI.Assets.load(ASSETS_LOADING, (p) => {
            // p goes 0→1; map into 0.05→0.65 of total
            setProgress(0.05 + p * 0.60);
        });

        setProgress(0.65);

        // ── Show loading screen ──
        const loadingScreen = new LoadingScreen();
        loadingScreen.build({
            background: PIXI.Assets.get('background'),
            creator: PIXI.Assets.get('creator'),
            name: PIXI.Assets.get('name'),
        });
        app.stage.addChild(loadingScreen);

        function layoutLoading() {
            loadingScreen.layout(director.dw, director.dh);
        }
        layoutLoading();

        // ── Phase 2: load remaining assets while loading screen is visible ──
        await PIXI.Assets.load(ASSETS_MAIN, (p) => {
            // p goes 0→1; map into 0.65→0.95 of total
            setProgress(0.65 + p * 0.30);
        });

        setProgress(1.0);

        // ── 1 second pause so player sees 100% ──
        await new Promise(r => setTimeout(r, 1000));

        // ── Build main scene ──
        const mainScene = new MainScene();
        mainScene.build();
        app.stage.addChild(mainScene);

        function layoutMain() {
            const scaleMax = Math.max(
                director.ww / 480,
                director.wh / 320
            );
            mainScene.layout(director.dw, director.dh, scaleMax);
        }

        // ── Single consolidated resize handler ──
        director.onResize(() => {
            layoutLoading();
            layoutMain();
        });
        layoutMain();

        // ── Instant cut: hide loading screen, show main scene ──
        hud.classList.add('hidden');
        app.stage.removeChild(loadingScreen);

        app.ticker.add((ticker) => {
            mainScene.tick(ticker.deltaTime / 60);
        });
    </script>
</body>

</html>
