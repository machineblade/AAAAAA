<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Dash</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            display: block;
        }

        /* ── Loading bar HUD — now rendered in PixiJS, no CSS needed ── */
        #hud {
            display: none;
        }
    </style>
</head>

<body>

    <!-- Loading bar now rendered in PixiJS -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/8.5.2/pixi.min.js"></script>
    <script type="module">
        import { Director } from './src/Director.js';
        import { LoadingScreen } from './src/LoadingScreen.js';
        import { MainScene } from './src/MainScreen.js';

        // ── Asset manifests ──
        const ASSETS_LOADING = [
            { alias: 'creator', src: './assets/creator.png' },
            { alias: 'name', src: './assets/name.png' },
            { alias: 'background', src: './assets/background.png' },
            { alias: 'sliderGroove', src: './assets/sliderGroove.png' },
            { alias: 'sliderBar', src: './assets/sliderBar.png' },
        ];

        const ASSETS_MAIN = [
            { alias: 'ground', src: './assets/ground.png' },
            { alias: 'groundline', src: './assets/groundline.png' },
            { alias: 'groundshadow', src: './assets/groundshadow.png' },
            { alias: 'playbutton', src: './assets/playbutton.png' },
            { alias: 'garageButton', src: './assets/garageButton.png' },
            { alias: 'editButton', src: './assets/editButton.png' },
        ];

        // ── Init PixiJS ──
        const app = new PIXI.Application();
        await app.init({
            resizeTo: window,
            backgroundColor: 0x000000,
            antialias: true,
        });
        document.body.appendChild(app.canvas);

        const director = new Director(app);

        // ── Phase 1: load assets + font ──
        await PIXI.Assets.load({
            src: './assets/resources/fonts/pusab.otf',
            data: { family: 'Pusab' },
        });
        await PIXI.Assets.load(ASSETS_LOADING);

        // ── Show loading screen with pixi progress bar ──
        const loadingScreen = new LoadingScreen();
        loadingScreen.build({
            background: PIXI.Assets.get('background'),
            creator: PIXI.Assets.get('creator'),
            name: PIXI.Assets.get('name'),
            sliderGroove: PIXI.Assets.get('sliderGroove'),
            sliderBar: PIXI.Assets.get('sliderBar'),
        });
        app.stage.addChild(loadingScreen);

        function layoutLoading() {
            loadingScreen.layout(director.dw, director.dh);
        }
        layoutLoading();

        // ── Phase 2: load each asset individually, bar steps 1/n per asset ──
        const total = ASSETS_MAIN.length;
        for (let i = 0; i < total; i++) {
            await PIXI.Assets.load(ASSETS_MAIN[i]);
            loadingScreen.setProgress((i + 1) / total);
        }

        // ── 1 second pause so player sees 100% ──
        await new Promise(r => setTimeout(r, 1000));

        // ── Build main scene ──
        const mainScene = new MainScene();
        mainScene.build();
        app.stage.addChild(mainScene);

        function layoutMain() {
            mainScene.layout(director.dw, director.dh);
        }

        // ── Single consolidated resize handler ──
        director.onResize(() => {
            layoutLoading();
            layoutMain();
        });
        layoutMain();

        // ── Instant cut to main scene ──
        app.stage.removeChild(loadingScreen);

        app.ticker.add((ticker) => {
            mainScene.tick(ticker.deltaTime / 60);
        });
    </script>
</body>

</html>
