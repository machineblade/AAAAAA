<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="./favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css">
    <title>Triangles</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"
        integrity="sha512-xi/RZRIF/S0hJ+yJJYuZ5yk6/8pCiRlEXZzoguSMl+vk2i3m6UjUO/WcZ11blRL/O+rnj94JRGwt/CHbc9+6EA=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.20.0/matter.min.js"
        integrity="sha512-6+7rTBmR6pRFe9fa0vCFjFaHZj/XYa7774bEBzRtxgdpIJOS++R3cKd6Prg/eJmxtsJotd8KAg4g57uuVQsZKA=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>

<body>
    <canvas id="canvas"></canvas>
    <div id="triangles"></div>

    <!-- Top-left: New Game -->
    <button id="newgame-btn">⟳ New Game</button>

    <!-- Bottom-right: Fullscreen -->
    <button id="fullscreen-btn">⛶</button>

    <div class="sliders">
        <label class="slider-label">
            <span class="slider-title">Bounciness</span>
            <div class="slider-row">
                <input type="range" min="0" max="1" step="0.01" value="0.7" id="bouncyslider">
                <span class="slider-value" id="bouncylabel">0.70</span>
            </div>
        </label>
        <label class="slider-label">
            <span class="slider-title">Friction</span>
            <div class="slider-row">
                <input type="range" min="0" max="1" step="0.01" value="0" id="frictionslider">
                <span class="slider-value" id="frictionlabel">0.00</span>
            </div>
        </label>
        <label class="slider-label">
            <span class="slider-title">Inertia</span>
            <div class="slider-row">
                <input type="range" min="0" max="1" step="0.01" value="1" id="inertiaslider">
                <span class="slider-value" id="inertialabel">1.00</span>
            </div>
        </label>
        <label class="slider-label">
            <span class="slider-title">Shrink Time (s)</span>
            <div class="slider-row">
                <input type="range" min="5" max="120" step="1" value="30" id="timeslider">
                <span class="slider-value" id="timelabel">30s</span>
            </div>
        </label>
    </div>

    <script type="module" src="./main.js"></script>
</body>

</html>
