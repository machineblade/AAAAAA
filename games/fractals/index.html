<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mandelbrot × Sierpiński GPU Fractal</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d0221; color: #ccc; font-family: monospace; overflow: hidden; }
  #c { display: block; width: 100vw; height: 100vh; cursor: crosshair; touch-action: none; }
  #hud {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(13,2,33,0.85);
    padding: 8px 14px;
    display: flex; gap: 18px; flex-wrap: wrap; align-items: center;
    font-size: 12px; border-top: 1px solid #1a0a3a;
  }
  #info { color: #13c5b0; min-width: 260px; }
  label { display: flex; align-items: center; gap: 6px; color: #8899aa; }
  input[type=range] { accent-color: #13c5b0; }
  button {
    background: #1a0a3a; border: 1px solid #13c5b0; color: #13c5b0;
    padding: 3px 10px; cursor: pointer; border-radius: 3px; font-family: monospace; font-size: 11px;
  }
  button:hover { background: #13c5b0; color: #0d0221; }
  #hint { color: #3a5a6a; font-size: 10px; }
  #webgl-error {
    display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    background: #1a0a3a; border: 1px solid #c03; padding: 30px; text-align: center;
    color: #f88; border-radius: 8px; max-width: 400px;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <span id="info">initialising…</span>
  <label>iterations
    <input type="range" id="sl_iter" min="64" max="1024" step="32" value="512">
    <span id="iter_v">512</span>
  </label>
  <label>IFS weight
    <input type="range" id="sl_ifs" min="0" max="0.15" step="0.005" value="0.04">
    <span id="ifs_v">0.040</span>
  </label>
  <label>IFS period
    <input type="range" id="sl_per" min="1" max="10" step="1" value="3">
    <span id="per_v">3</span>
  </label>
  <button id="btn_reset">reset</button>
  <button id="btn_save">save PNG</button>
  <span id="hint">drag: pan &nbsp;|&nbsp; scroll: zoom &nbsp;|&nbsp; dblclick: centre+zoom</span>
</div>
<div id="webgl-error">
  <h2 style="color:#f88;margin-bottom:12px">WebGL not available</h2>
  <p>Your browser or GPU driver does not support WebGL.<br>
  Try Chrome, Firefox, or Edge on a desktop machine.</p>
</div>

<script>
// ---------------------------------------------------------------------------
// WebGL setup
// ---------------------------------------------------------------------------
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl', { preserveDrawingBuffer: true })
        || canvas.getContext('experimental-webgl', { preserveDrawingBuffer: true });

if (!gl) {
  document.getElementById('webgl-error').style.display = 'block';
  throw new Error('WebGL unavailable');
}

// ---------------------------------------------------------------------------
// Shaders
// ---------------------------------------------------------------------------
const VS = `
attribute vec2 a_pos;
void main() {
  gl_Position = vec4(a_pos, 0.0, 1.0);
}`;

// NOTE: WebGL 1 does not support double precision.
// We emulate 64-bit pan/zoom with two 32-bit floats (hi + lo) using
// Dekker / two-sum splitting so deep zooms stay sharp.
const FS = `
precision highp float;

uniform vec2  u_res;
uniform vec2  u_cx_hilo;   // center real:  hi + lo
uniform vec2  u_cy_hilo;   // center imag:  hi + lo
uniform vec2  u_zoom_hilo; // half-width:   hi + lo
uniform int   u_maxiter;
uniform float u_ifs_w;
uniform float u_ifs_per;

// Add two doubles stored as (hi,lo) pairs -- Dekker trick
vec2 dadd(vec2 a, vec2 b) {
  float s = a.x + b.x;
  float v = s - a.x;
  float e = (a.x - (s - v)) + (b.x - v) + a.y + b.y;
  return vec2(s, e);
}

vec2 dsub(vec2 a, vec2 b) {
  return dadd(a, vec2(-b.x, -b.y));
}

vec2 dmul_f(vec2 a, float b) {
  float p = a.x * b;
  float e = a.x * b - p + a.y * b;
  return vec2(p, e);
}

float d2f(vec2 a) { return a.x + a.y; }

void main() {
  // Pixel -> complex plane  (double-precision emulation)
  float fx = (gl_FragCoord.x / u_res.x - 0.5) * 2.0;
  float fy = (gl_FragCoord.y / u_res.y - 0.5) * 2.0;
  float ar = u_res.x / u_res.y;

  float cr = d2f(dadd(u_cx_hilo, dmul_f(u_zoom_hilo, fx * ar)));
  float ci = d2f(dadd(u_cy_hilo, dmul_f(u_zoom_hilo, fy)));

  // Sierpinski triangle vertices in the complex plane
  const vec2 v0 = vec2(0.0,          0.0);
  const vec2 v1 = vec2(1.0,          0.0);
  const vec2 v2 = vec2(0.5, 0.866025403);

  float zr = 0.0, zi = 0.0;
  float esc = -1.0;

  for (int i = 0; i < 1024; i++) {
    if (i >= u_maxiter) break;

    // Mandelbrot: z = z^2 + c
    float zr2 = zr*zr - zi*zi + cr;
    float zi2 = 2.0*zr*zi   + ci;
    zr = zr2; zi = zi2;

    // IFS fold: nudge z toward nearest Sierpinski vertex
    float period = u_ifs_per;
    if (mod(float(i), period) < 1.0) {
      vec2 z2 = vec2(zr, zi);
      float d0 = dot(z2-v0, z2-v0);
      float d1 = dot(z2-v1, z2-v1);
      float d2 = dot(z2-v2, z2-v2);
      vec2 nearest;
      if      (d0 <= d1 && d0 <= d2) nearest = v0;
      else if (d1 <= d2)              nearest = v1;
      else                            nearest = v2;
      zr += u_ifs_w * (nearest.x - zr);
      zi += u_ifs_w * (nearest.y - zi);
    }

    // Escape test + smooth colouring
    float r2 = zr*zr + zi*zi;
    if (r2 > 4.0) {
      // Guard against log(0) / log(negative)
      float lg = log(max(sqrt(r2), 1.0001));
      float smooth_i = float(i) + 1.0 - log(max(lg / log(2.0), 1e-6));
      esc = smooth_i;
      break;
    }
  }

  // Interior (bounded) points
  if (esc < 0.0) {
    gl_FragColor = vec4(0.04, 0.01, 0.12, 1.0);
    return;
  }

  // Map to colour  (12 cycles through the ramp for tight banding)
  float t = fract(esc / float(u_maxiter) * 12.0);

  // Colour ramp: black -> deep blue -> cyan -> white -> yellow -> orange -> red -> black
  vec3 col;
  if      (t < 0.10) col = mix(vec3(0.000,0.000,0.000), vec3(0.04,0.04,0.18), t/0.10);
  else if (t < 0.25) col = mix(vec3(0.04,0.04,0.18),  vec3(0.05,0.17,0.43), (t-0.10)/0.15);
  else if (t < 0.40) col = mix(vec3(0.05,0.17,0.43),  vec3(0.10,0.44,0.66), (t-0.25)/0.15);
  else if (t < 0.50) col = mix(vec3(0.10,0.44,0.66),  vec3(0.00,0.83,1.00), (t-0.40)/0.10);
  else if (t < 0.60) col = mix(vec3(0.00,0.83,1.00),  vec3(1.00,1.00,1.00), (t-0.50)/0.10);
  else if (t < 0.70) col = mix(vec3(1.00,1.00,1.00),  vec3(1.00,0.88,0.40), (t-0.60)/0.10);
  else if (t < 0.80) col = mix(vec3(1.00,0.88,0.40),  vec3(1.00,0.42,0.00), (t-0.70)/0.10);
  else if (t < 0.90) col = mix(vec3(1.00,0.42,0.00),  vec3(0.75,0.00,0.24), (t-0.80)/0.10);
  else               col = mix(vec3(0.75,0.00,0.24),   vec3(0.00,0.00,0.00), (t-0.90)/0.10);

  gl_FragColor = vec4(col, 1.0);
}`;

function compileShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    throw new Error('Shader compile error:\n' + gl.getShaderInfoLog(s));
  }
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, compileShader(gl.VERTEX_SHADER,   VS));
gl.attachShader(prog, compileShader(gl.FRAGMENT_SHADER, FS));
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
  throw new Error('Program link error:\n' + gl.getProgramInfoLog(prog));
}
gl.useProgram(prog);

// Full-screen quad
const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER,
  new Float32Array([-1,-1, 1,-1, -1,1, 1,1]),
  gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

// Uniform locations
const uRes    = gl.getUniformLocation(prog, 'u_res');
const uCxHilo = gl.getUniformLocation(prog, 'u_cx_hilo');
const uCyHilo = gl.getUniformLocation(prog, 'u_cy_hilo');
const uZmHilo = gl.getUniformLocation(prog, 'u_zoom_hilo');
const uIter   = gl.getUniformLocation(prog, 'u_maxiter');
const uIfsW   = gl.getUniformLocation(prog, 'u_ifs_w');
const uIfsPer = gl.getUniformLocation(prog, 'u_ifs_per');

// ---------------------------------------------------------------------------
// Double-precision split (Dekker) helpers in JS
// ---------------------------------------------------------------------------
function split(x) {
  // Returns [hi, lo] such that hi + lo == x exactly
  const t = (2**27 + 1) * x;
  const hi = t - (t - x);
  const lo = x - hi;
  return [hi, lo];
}

// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let cx = -0.75, cy = 0.1, zoom = 0.6;
let maxiter = 512, ifsW = 0.04, ifsPer = 3;
let dirty = true;

// ---------------------------------------------------------------------------
// Render loop
// ---------------------------------------------------------------------------
function resize() {
  const dpr = window.devicePixelRatio || 1;
  const w = (canvas.clientWidth  * dpr) | 0;
  const h = (canvas.clientHeight * dpr) | 0;
  if (canvas.width !== w || canvas.height !== h) {
    canvas.width  = w;
    canvas.height = h;
    dirty = true;
  }
}

function draw() {
  resize();
  if (dirty) {
    dirty = false;
    gl.viewport(0, 0, canvas.width, canvas.height);

    const [cxHi, cxLo] = split(cx);
    const [cyHi, cyLo] = split(cy);
    const [zmHi, zmLo] = split(zoom);

    gl.uniform2f(uRes,    canvas.width, canvas.height);
    gl.uniform2f(uCxHilo, cxHi, cxLo);
    gl.uniform2f(uCyHilo, cyHi, cyLo);
    gl.uniform2f(uZmHilo, zmHi, zmLo);
    gl.uniform1i(uIter,   maxiter);
    gl.uniform1f(uIfsW,   ifsW);
    gl.uniform1f(uIfsPer, ifsPer);

    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

    document.getElementById('info').textContent =
      `c = (${cx.toFixed(6)}, ${cy.toFixed(6)})   zoom ${(1/zoom).toFixed(2)}×`;
  }
  requestAnimationFrame(draw);
}

draw();

// ---------------------------------------------------------------------------
// Interaction – pan / zoom
// ---------------------------------------------------------------------------
let drag = null;

canvas.addEventListener('mousedown', e => {
  drag = { x: e.clientX, y: e.clientY, cx, cy };
});
window.addEventListener('mousemove', e => {
  if (!drag) return;
  const ar = canvas.clientWidth / canvas.clientHeight;
  cx = drag.cx - (e.clientX - drag.x) / canvas.clientWidth  * zoom * 2 * ar;
  cy = drag.cy + (e.clientY - drag.y) / canvas.clientHeight * zoom * 2;
  dirty = true;
});
window.addEventListener('mouseup', () => { drag = null; });

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const f  = e.deltaY > 0 ? 1.2 : 1 / 1.2;
  const ar = canvas.clientWidth / canvas.clientHeight;
  const mx = (e.offsetX / canvas.clientWidth  - 0.5) * zoom * 2 * ar;
  const my = (0.5 - e.offsetY / canvas.clientHeight) * zoom * 2;
  cx += mx * (1 - f);
  cy += my * (1 - f);
  zoom *= f;
  dirty = true;
}, { passive: false });

canvas.addEventListener('dblclick', e => {
  const ar = canvas.clientWidth / canvas.clientHeight;
  cx += (e.offsetX / canvas.clientWidth  - 0.5) * zoom * 2 * ar;
  cy += (0.5 - e.offsetY / canvas.clientHeight) * zoom * 2;
  zoom /= 2;
  dirty = true;
});

// Touch support
let touch0 = null, touch1 = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    touch0 = { x: e.touches[0].clientX, y: e.touches[0].clientY, cx, cy };
    touch1 = null;
  } else if (e.touches.length === 2) {
    touch1 = {
      dist: Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY),
      zoom
    };
    touch0 = null;
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const ar = canvas.clientWidth / canvas.clientHeight;
  if (touch0 && e.touches.length === 1) {
    cx = touch0.cx - (e.touches[0].clientX - touch0.x) / canvas.clientWidth  * zoom * 2 * ar;
    cy = touch0.cy + (e.touches[0].clientY - touch0.y) / canvas.clientHeight * zoom * 2;
    dirty = true;
  } else if (touch1 && e.touches.length === 2) {
    const d = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY);
    zoom = touch1.zoom * (touch1.dist / d);
    dirty = true;
  }
}, { passive: false });

// ---------------------------------------------------------------------------
// UI controls
// ---------------------------------------------------------------------------
const slIter = document.getElementById('sl_iter');
const slIfs  = document.getElementById('sl_ifs');
const slPer  = document.getElementById('sl_per');

slIter.addEventListener('input', () => {
  maxiter = +slIter.value;
  document.getElementById('iter_v').textContent = maxiter;
  dirty = true;
});
slIfs.addEventListener('input', () => {
  ifsW = +slIfs.value;
  document.getElementById('ifs_v').textContent = ifsW.toFixed(3);
  dirty = true;
});
slPer.addEventListener('input', () => {
  ifsPer = +slPer.value;
  document.getElementById('per_v').textContent = ifsPer;
  dirty = true;
});

document.getElementById('btn_reset').addEventListener('click', () => {
  cx = -0.75; cy = 0.1; zoom = 0.6;
  maxiter = 512; ifsW = 0.04; ifsPer = 3;
  slIter.value = 512; slIfs.value = 0.04; slPer.value = 3;
  document.getElementById('iter_v').textContent = 512;
  document.getElementById('ifs_v').textContent  = '0.040';
  document.getElementById('per_v').textContent  = 3;
  dirty = true;
});

document.getElementById('btn_save').addEventListener('click', () => {
  // Force a fresh render into the buffer before saving
  dirty = true;
  requestAnimationFrame(() => {
    const link = document.createElement('a');
    link.download = `fractal_${Date.now()}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  });
});
</script>
</body>
</html>
